<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2c583c",
                        "background-light": "#f6f7f7",
                        "background-dark": "#161c18",
                    },
                    fontFamily: {
                        "display": ["Spline Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>KrushiSense - Loading</title>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 overflow-hidden">
<div class="relative flex min-h-screen w-full flex-col items-center justify-center overflow-hidden">
<!-- Background Grain/Texture Overlay -->
<div class="absolute inset-0 opacity-5 pointer-events-none bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')]"></div>
<!-- Main Content Container -->
<div class="relative z-10 flex flex-col items-center max-w-md w-full px-6 text-center">
<!-- Logo/Branding Header -->
<div class="mb-12 flex items-center gap-2">
<div class="flex items-center justify-center w-10 h-10 rounded-xl bg-primary/20 text-primary border border-primary/30">
<span class="material-symbols-outlined text-3xl">eco</span>
</div>
<h2 class="text-2xl font-bold tracking-tight text-slate-900 dark:text-slate-100">KrushiSense</h2>
</div>
<!-- Animated Plant Illustration Placeholder Area -->
<div class="relative w-64 h-64 mb-12 flex items-center justify-center">
<!-- Outer Glow -->
<div class="absolute inset-0 bg-primary/10 blur-3xl rounded-full"></div>
<!-- The "Growing Plant" Visual Representation -->
<div class="relative flex flex-col items-center">
<!-- Sprouting Leaf Icon -->
<div class="mb-4">
<span class="material-symbols-outlined text-8xl text-primary drop-shadow-[0_0_15px_rgba(44,88,60,0.5)]">
                            psychology_alt
                        </span>
</div>
<!-- Environment Micro-elements -->
<div class="absolute -top-4 -right-4">
<span class="material-symbols-outlined text-primary/40 text-2xl">wb_sunny</span>
</div>
<div class="absolute top-1/2 -left-8">
<span class="material-symbols-outlined text-primary/40 text-2xl">water_drop</span>
</div>
<div class="absolute -bottom-2 right-4">
<span class="material-symbols-outlined text-primary/40 text-2xl">air</span>
</div>
</div>
</div>
<!-- Status Text Section -->
<div class="w-full space-y-6">
<div class="flex flex-col gap-2">
<div class="flex justify-between items-end">
<span class="text-lg font-medium text-slate-900 dark:text-slate-100">Analyzing soil...</span>
<span class="text-sm font-semibold text-primary">65%</span>
</div>
<!-- Progress Bar Component -->
<div class="h-3 w-full bg-slate-200 dark:bg-slate-800 rounded-full overflow-hidden border border-slate-300 dark:border-slate-700">
<div class="h-full bg-primary rounded-full" style="width: 65%;"></div>
</div>
</div>
<!-- Cycling Sub-status -->
<div class="flex flex-col gap-3">
<div class="flex items-center justify-center gap-3 py-2 px-4 bg-primary/10 border border-primary/20 rounded-xl">
<span class="material-symbols-outlined text-primary animate-pulse text-sm">settings_input_antenna</span>
<p class="text-sm font-normal text-slate-600 dark:text-slate-400">Connecting to local weather stations...</p>
</div>
<p class="text-xs uppercase tracking-widest text-slate-400 dark:text-slate-500 font-semibold">
                        Cultivating your digital farm
                    </p>
</div>
</div>
</div>
<!-- Decorative Bottom Elements -->
<div class="absolute bottom-0 left-0 w-full h-32 bg-gradient-to-t from-primary/10 to-transparent pointer-events-none"></div>
<div class="absolute bottom-8 flex gap-8 opacity-20">
<span class="material-symbols-outlined text-4xl text-primary">grass</span>
<span class="material-symbols-outlined text-4xl text-primary">potted_plant</span>
<span class="material-symbols-outlined text-4xl text-primary">agriculture</span>
<span class="material-symbols-outlined text-4xl text-primary">yard</span>
</div>
</div>
<!-- Background Illustration for Ambience -->
<div class="fixed top-0 left-0 w-full h-full -z-10 overflow-hidden">
<div class="absolute top-[-10%] right-[-10%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[50%] h-[50%] bg-primary/5 rounded-full blur-[120px]"></div>
</div>
</body></html>
